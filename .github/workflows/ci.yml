name: CI

on:
  pull_request:

jobs:
  pre-commit:
    uses: genebean/.github/.github/workflows/pre-commit-nix.yml@main
    with:
      npm-install: true

  nix-check:
    uses: genebean/.github/.github/workflows/nix-build.yml@main
    with:
      npmDepsHash-glob: pkgs/*.nix
      build-command: nix flake check

  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Install npm dependencies
        run: nix develop --command npm ci --include=dev
      - name: Type check
        run: nix develop --command npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Install npm dependencies
        run: nix develop --command npm ci --include=dev
      - name: Run tests
        run: nix develop --command npm test

  build:
    name: npm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Install npm dependencies
        run: nix develop --command npm ci --include=dev
      - name: Build package
        run: nix develop --command npm run build

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Audit for critical vulnerabilities
        run: npm audit --audit-level=critical

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0
